<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circular Flow Matrix</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background:
        radial-gradient(circle at 15% 20%, rgba(0,255,136,0.09), transparent 38%),
        radial-gradient(circle at 82% 76%, rgba(255,107,107,0.10), transparent 42%),
        linear-gradient(160deg, #050513 0%, #07071a 55%, #0b0b25 100%);
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      user-select: none;
    }

    /* ── Header ─────────────────────────────────────── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; height: 64px;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      background: rgba(7,7,26,0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08); z-index: 100;
    }
    #header h1 {
      font-size: 1.4rem; font-weight: 800; letter-spacing: .04em;
      background: linear-gradient(90deg,#00ff88,#ffcc00,#ff6b6b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #header .hint { font-size: .7rem; color: #666677; margin-top: 2px; }

    /* ── Main SVG ────────────────────────────────────── */
    #diagram { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: visible; }

    /* ── Entity cards ────────────────────────────────── */
    .ecard {
      position: fixed; transform: translate(-50%,-50%);
      border-radius: 14px; padding: 10px 14px; text-align: center;
      cursor: pointer; border: 2px solid; min-width: 116px;
      backdrop-filter: blur(14px);
      box-shadow: 0 6px 18px rgba(0,0,0,.35);
      transition: transform .2s, box-shadow .3s, border-color .2s;
      z-index: 20;
    }
    .ecard:hover { transform: translate(-50%,-50%) scale(1.12); }
    .ecard .icon { font-size: 1.5rem; display: block; }
    .ecard .name { font-size: .82rem; font-weight: 700; margin-top: 3px; }
    .ecard .sub  { font-size: .62rem; opacity: .7; margin-top: 2px; line-height: 1.3; }

    .ecard.households    { background: rgba(77,171,247,.15);  border-color: #4dabf7; }
    .ecard.businesses    { background: rgba(255,169,77,.15);  border-color: #ffa94d; }
    .ecard.government    { background: rgba(255,107,107,.15); border-color: #ff6b6b; }
    .ecard.factor-market { background: rgba(218,119,242,.15); border-color: #da77f2; }
    .ecard.product-market{ background: rgba(105,219,124,.15); border-color: #69db7c; }

    .ecard.active {
      transform: translate(-50%,-50%) scale(1.12);
      filter: brightness(1.3);
    }

    /* ── Info panel ──────────────────────────────────── */
    #info-panel {
      position: fixed; right: -440px; top: 50%; transform: translateY(-50%);
      width: min(420px, calc(100vw - 28px)); max-height: 82vh; overflow-y: auto;
      background: rgba(10,10,35,0.97); border: 1px solid rgba(255,255,255,.13);
      border-radius: 18px; padding: 26px; z-index: 300;
      transition: right .4s cubic-bezier(.16,1,.3,1); backdrop-filter: blur(20px);
    }
    #info-panel.open { right: 18px; }
    #info-panel .ph { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    #info-panel .pico { font-size: 2.4rem; }
    #info-panel h2 { font-size: 1.25rem; font-weight: 800; }
    #info-panel .ptyp { font-size: .72rem; color: #888; margin-top: 2px; }
    #info-panel .pdesc { color: #bbb; line-height: 1.7; font-size: .87rem; margin-bottom: 14px; }
    #info-panel ul { list-style: none; }
    #info-panel li {
      padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,.07);
      font-size: .82rem; color: #ddd; display: flex; align-items: flex-start; gap: 8px;
    }
    #info-panel li::before { content: '▸'; color: #888; flex-shrink: 0; }
    #close-btn {
      position: absolute; top: 12px; right: 16px;
      background: none; border: none; color: #555; font-size: 1.3rem;
      cursor: pointer; transition: color .2s;
    }
    #close-btn:hover { color: #fff; }

    /* ── Flow detail popup ───────────────────────────── */
    #flow-popup {
      position: fixed; pointer-events: none;
      background: rgba(10,10,35,.97); border: 1px solid rgba(255,255,255,.15);
      border-radius: 10px; padding: 10px 14px; font-size: .78rem; z-index: 400;
      max-width: 230px; display: none; line-height: 1.6;
    }
    #flow-popup .fp-label { font-weight: 700; margin-bottom: 4px; }
    #flow-popup .fp-sub   { color: #aaa; font-size: .72rem; }

    /* ── Controls ────────────────────────────────────── */
    #controls {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 100; flex-wrap: wrap; justify-content: center;
    }
    .btn {
      padding: 7px 16px; border: 2px solid; border-radius: 24px;
      background: transparent; cursor: pointer; font-size: .78rem; font-weight: 700;
      transition: all .25s; letter-spacing: .03em;
    }
    .btn.goods  { border-color: #00ff88; color: #00ff88; }
    .btn.goods.on  { background: #00ff88; color: #000; box-shadow: 0 0 14px #00ff8899; }
    .btn.money  { border-color: #ffcc00; color: #ffcc00; }
    .btn.money.on  { background: #ffcc00; color: #000; box-shadow: 0 0 14px #ffcc0099; }
    .btn.govt   { border-color: #ff6b6b; color: #ff6b6b; }
    .btn.govt.on   { background: #ff6b6b; color: #000; box-shadow: 0 0 14px #ff6b6b99; }
    .btn.pause  { border-color: #8899aa; color: #8899aa; }
    .btn.pause.on  { background: #8899aa; color: #000; }
    .btn.reset  { border-color: #7c7cff; color: #7c7cff; }
    .btn.reset:hover { background: #7c7cff22; }

    /* ── Legend ──────────────────────────────────────── */
    #legend {
      position: fixed; left: 18px; top: 76px;
      background: rgba(10,10,35,.88); border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px; padding: 14px 16px; z-index: 100; font-size: .76rem;
    }
    #legend h4 { color: #555566; margin-bottom: 9px; font-size: .68rem; text-transform: uppercase; letter-spacing: .12em; }
    .leg { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .leg-line { width: 30px; height: 3px; border-radius: 2px; position: relative; }
    .leg-line::after { content:'▶'; position: absolute; right:-9px; top:-6px; font-size: 9px; }

    /* ── Wheel speed badge ───────────────────────────── */
    #speed-badge {
      position: fixed; right: 18px; bottom: 18px;
      background: rgba(10,10,35,.8); border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; padding: 10px 14px; z-index: 100; font-size: .74rem; color: #666677;
    }
    #speed-badge span { display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .1em; font-size: .65rem; }
    .speed-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .speed-dot { width: 8px; height: 8px; border-radius: 50%; }

    @media (max-width: 860px) {
      #legend { display: none; }
      .ecard { min-width: 102px; padding: 9px 12px; }
      .ecard .icon { font-size: 1.3rem; }
      .ecard .name { font-size: .76rem; }
      .ecard .sub  { font-size: .58rem; }
      #controls { bottom: 12px; }
      .btn { padding: 6px 12px; font-size: .72rem; }
    }

    @media (max-width: 560px) {
      .ecard { min-width: 86px; padding: 7px 10px; border-radius: 12px; }
      .ecard .icon { font-size: 1.05rem; }
      .ecard .name { font-size: .67rem; margin-top: 1px; }
      .ecard .sub  { display: none; }
      #speed-badge { display: none; }
      #header h1 { font-size: 1.05rem; }
      #header .hint { font-size: .6rem; }
    }

    /* ── Misc ────────────────────────────────────────── */
    .no-pe { pointer-events: none; }
  </style>
</head>
<body>

<!-- Header -->
<div id="header">
  <h1>🔄 Circular Flow Matrix</h1>
  <div class="hint">Click any element to explore · Toggle flows below · Follow animated dots to see what flows where</div>
</div>

<!-- Main SVG diagram -->
<svg id="diagram" xmlns="http://www.w3.org/2000/svg"></svg>

<!-- Entity cards (injected by JS) -->
<div id="cards"></div>

<!-- Info panel -->
<div id="info-panel">
  <button id="close-btn" onclick="closePanel()">✕</button>
  <div class="ph">
    <span class="pico" id="panel-icon"></span>
    <div>
      <h2 id="panel-title"></h2>
      <div class="ptyp" id="panel-type"></div>
    </div>
  </div>
  <p class="pdesc" id="panel-desc"></p>
  <ul id="panel-list"></ul>
</div>

<!-- Flow popup tooltip -->
<div id="flow-popup">
  <div class="fp-label" id="fp-label"></div>
  <div class="fp-sub" id="fp-sub"></div>
</div>

<!-- Legend -->
<div id="legend">
  <h4>Legend</h4>
  <div class="leg">
    <div class="leg-line" style="background:#00ff88;color:#00ff88;"></div>
    <span style="color:#00ff88;">Goods &amp; Services (↻)</span>
  </div>
  <div class="leg">
    <div class="leg-line" style="background:#ffcc00;color:#ffcc00;"></div>
    <span style="color:#ffcc00;">Money Flow (↺)</span>
  </div>
  <div class="leg">
    <div class="leg-line" style="background:#ff6b6b;color:#ff6b6b;"></div>
    <span style="color:#ff6b6b;">Government</span>
  </div>
</div>

<!-- Controls -->
<div id="controls">
  <button class="btn goods on" id="btn-goods" onclick="toggleLayer('goods')">🏭 Goods &amp; Services</button>
  <button class="btn money on" id="btn-money" onclick="toggleLayer('money')">💰 Money Flow</button>
  <button class="btn govt on"  id="btn-govt"  onclick="toggleLayer('govt')">🏛️ Government</button>
  <button class="btn pause"   id="btn-pause" onclick="togglePause()">⏸ Pause</button>
  <button class="btn reset"   onclick="resetView()">↺ Reset</button>
</div>

<!-- Speed badge -->
<div id="speed-badge">
  <span>Flow Directions</span>
  <div class="speed-row"><div class="speed-dot" style="background:#00ff88;"></div>Outer ring: Clockwise</div>
  <div class="speed-row"><div class="speed-dot" style="background:#ffcc00;"></div>Inner ring: Counter-clockwise</div>
</div>

<script>
/* ======================================================
   DATA
   ====================================================== */
const ENTITIES = {
  households: {
    id: 'households', icon: '🏠', name: 'Households',
    sub: 'Consumers &amp; Resource Owners', type: 'households', color: '#4dabf7',
    title: 'Households', typeLabel: 'Economic Actor',
    desc: 'Households own all four factors of production — land, labor, capital, and entrepreneurship. They supply these resources to businesses through the factor market and receive income in return. Households then spend that income on goods and services in the product market, completing the economic cycle.',
    details: [
      'Own all 4 factors of production',
      'Supply: Land · Labor · Capital · Entrepreneurship',
      'Receive income: Wages · Rent · Interest · Profit',
      'Consumer Spending — buy goods &amp; services',
      'Pay income taxes to government',
      'Vote for government spending priorities'
    ]
  },
  factorMarket: {
    id: 'factorMarket', icon: '⚙️', name: 'Factor Market',
    sub: 'Resource Market', type: 'factor-market', color: '#da77f2',
    title: 'Factor / Resource Market', typeLabel: 'Market',
    desc: 'The Factor Market (also called the Resource Market) is where factors of production are bought and sold. Households supply their resources here; businesses purchase them. The government also participates by buying resources for public services.',
    details: [
      'Land — natural resources &amp; raw materials',
      'Labor — human work, skills, and time',
      'Capital — machines, tools, buildings',
      'Entrepreneurship — innovation &amp; risk-taking',
      'Businesses hire &amp; buy resources here',
      'Government purchases resources here too'
    ]
  },
  businesses: {
    id: 'businesses', icon: '🏭', name: 'Businesses',
    sub: 'Producers &amp; Employers', type: 'businesses', color: '#ffa94d',
    title: 'Businesses', typeLabel: 'Economic Actor',
    desc: 'Businesses purchase factors of production from households via the factor market, combine them to produce goods and services, then sell those products in the product market. They are the main producers in the economy — their costs become households\' income.',
    details: [
      'Purchase factors from the Factor Market',
      'Pay Wages (for labor), Rent (for land), Interest (for capital)',
      'Revenue = income from product market sales',
      'Costs = payments to factor market',
      'Produce goods &amp; services for sale',
      'Pay business taxes to government'
    ]
  },
  productMarket: {
    id: 'productMarket', icon: '🛒', name: 'Product Market',
    sub: 'Goods &amp; Services Market', type: 'product-market', color: '#69db7c',
    title: 'Product Market', typeLabel: 'Market',
    desc: 'The Product Market is where finished goods and services are exchanged. Businesses supply products here, while households buy them (consumer spending). The government also purchases goods and services here for public programs.',
    details: [
      'Businesses supply finished goods &amp; services',
      'Households demand &amp; buy goods (consumer spending)',
      'Government also buys goods &amp; services here',
      'Prices set by supply &amp; demand',
      'Revenue flows from households → businesses',
      'Economic output measured here (GDP)'
    ]
  },
  government: {
    id: 'government', icon: '🏛️', name: 'Government',
    sub: 'Taxes &amp; Public Spending', type: 'government', color: '#ff6b6b',
    title: 'Government', typeLabel: 'Economic Actor',
    desc: 'The government connects with every part of the circular flow. It collects taxes from both households (income taxes) and businesses (corporate taxes), then re-injects that money into the economy through spending at both markets.',
    details: [
      'Collects income taxes from households',
      'Collects corporate taxes from businesses',
      'Government spending at Factor Market (hire workers, buy resources)',
      'Government spending at Product Market (buy goods &amp; services)',
      'Provides public goods: defense, education, infrastructure',
      'Fiscal policy affects the whole circular flow'
    ]
  }
};

const GOODS_FLOWS = [
  { from:'households',   to:'factorMarket',  label:'Factors of Production', sub:'Land · Labor · Capital · Entrepreneurship', color:'#00ff88', arc:'outer' },
  { from:'factorMarket', to:'businesses',    label:'Resources to Businesses', sub:'Businesses receive factors to produce', color:'#00ff88', arc:'outer' },
  { from:'businesses',   to:'productMarket', label:'Goods &amp; Services', sub:'Businesses supply finished products', color:'#00ff88', arc:'outer' },
  { from:'productMarket',to:'households',    label:'Consumer Goods', sub:'Households receive goods &amp; services', color:'#00ff88', arc:'outer' }
];

const MONEY_FLOWS = [
  { from:'businesses',   to:'factorMarket',  label:'Business Costs', sub:'Payments for land · labor · capital', color:'#ffcc00', arc:'inner' },
  { from:'factorMarket', to:'households',    label:'Income', sub:'Wages · Rent · Interest · Profit', color:'#ffcc00', arc:'inner' },
  { from:'households',   to:'productMarket', label:'Consumer Spending', sub:'Households pay for goods &amp; services', color:'#ffcc00', arc:'inner' },
  { from:'productMarket',to:'businesses',    label:'Revenue', sub:'Money flows back to businesses', color:'#ffcc00', arc:'inner' }
];

const GOVT_FLOWS = [
  { from:'households',   to:'government',    label:'Household Taxes',   sub:'Income taxes', color:'#ff6b6b' },
  { from:'businesses',   to:'government',    label:'Business Taxes',    sub:'Corporate taxes', color:'#ff6b6b' },
  { from:'government',   to:'factorMarket',  label:'Govt Spending', sub:'At resource market', color:'#ff6b6b' },
  { from:'government',   to:'productMarket', label:'Govt Spending', sub:'At product market', color:'#ff6b6b' }
];

/* ======================================================
   STATE
   ====================================================== */
const state = {
  goodsOn: true, moneyOn: true, govtOn: true, paused: false,
  activeId: null, layout: null, particles: [], raf: null
};

/* ======================================================
   LAYOUT
   ====================================================== */
function computeLayout() {
  const W = window.innerWidth, H = window.innerHeight;
  const HDR = 64, CTRL = 58;
  const availH = H - HDR - CTRL;
  const isCompact = W < 860 || H < 640;
  const govGap = isCompact ? 78 : 92;
  const topPad = isCompact ? 92 : 108;
  const ringSpace = Math.max(220, availH - topPad);
  const cx = W / 2;
  const cy = HDR + topPad + ringSpace / 2;
  const maxR = Math.min(W * (isCompact ? 0.32 : 0.37), ringSpace * 0.44);
  const outerR = Math.min(maxR, isCompact ? 162 : 195);
  const innerR = outerR * 0.54;
  // Angles: 0=right, 90=down, 180=left, 270=up (SVG coords)
  const angles = { households: 180, factorMarket: 270, businesses: 0, productMarket: 90 };
  const pos = {};
  for (const [id, ang] of Object.entries(angles)) {
    const a = ang * Math.PI / 180;
    pos[id] = { x: cx + outerR * Math.cos(a), y: cy + outerR * Math.sin(a) };
  }
  const factorY = pos.factorMarket.y;
  const govY = Math.max(HDR + 24, factorY - govGap);
  pos.government = { x: cx, y: govY };
  return { W, H, cx, cy, outerR, innerR, pos, HDR };
}

/* ======================================================
   HELPERS
   ====================================================== */
const SVG_NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs={}, text='') {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text) e.textContent = text;
  return e;
}
function midAngle(fromId, toId) {
  const ANG = { households:180, factorMarket:270, businesses:0, productMarket:90 };
  let a = ANG[fromId], b = ANG[toId];
  // pick shorter arc midpoint
  let diff = b - a; if (diff > 180) diff -= 360; if (diff < -180) diff += 360;
  return a + diff / 2;
}

function entityLabel(id) {
  return ENTITIES[id] ? ENTITIES[id].name : id;
}

function routeLabel(flow) {
  return `${flow.label} · ${entityLabel(flow.from)} → ${entityLabel(flow.to)}`;
}

function addPathPulse(parent, d, color, filterId, dur) {
  const pulse = el('circle', { r:'3.4', fill:color, opacity:'0.96', filter:`url(#${filterId})`, class:'no-pe' });
  const motion = el('animateMotion', {
    path: d,
    dur: state.paused ? '99999s' : dur,
    repeatCount: 'indefinite',
    rotate: 'auto'
  });
  pulse.appendChild(motion);
  parent.appendChild(pulse);
}

/* ======================================================
   SVG BUILDING
   ====================================================== */
const svg = document.getElementById('diagram');
let layers = {};

function buildSVG() {
  svg.innerHTML = '';
  const { W, H, cx, cy, outerR, innerR } = state.layout;

  // ── Defs ──
  const defs = el('defs');
  // Glow filters
  [['glow-green','#00ff88'],['glow-gold','#ffcc00'],['glow-red','#ff6b6b'],
   ['glow-blue','#4dabf7'],['glow-purple','#da77f2'],['glow-teal','#69db7c']
  ].forEach(([id, col]) => {
    const f = el('filter', { id, x:'-60%', y:'-60%', width:'220%', height:'220%' });
    f.appendChild(el('feGaussianBlur', { in:'SourceGraphic', stdDeviation:'5', result:'blur' }));
    const fm = el('feMerge'); fm.appendChild(el('feMergeNode',{in:'blur'})); fm.appendChild(el('feMergeNode',{in:'SourceGraphic'}));
    f.appendChild(fm); defs.appendChild(f);
  });
  // Arrow markers
  [['arr-green','#00ff88'],['arr-gold','#ffcc00'],['arr-red','#ff6b6b']].forEach(([id,col]) => {
    const m = el('marker', { id, markerWidth:'9', markerHeight:'7', refX:'8', refY:'3.5', orient:'auto' });
    m.appendChild(el('polygon', { points:'0 0, 9 3.5, 0 7', fill:col }));
    defs.appendChild(m);
    // reverse
    const mr = el('marker', { id:id+'-r', markerWidth:'9', markerHeight:'7', refX:'1', refY:'3.5', orient:'auto-start-reverse' });
    mr.appendChild(el('polygon', { points:'0 0, 9 3.5, 0 7', fill:col }));
    defs.appendChild(mr);
  });
  svg.appendChild(defs);

  // ── Background ambient circles ──
  const bg = el('g',{id:'bg'}); svg.appendChild(bg);
  // faint halo
  [outerR*1.18, outerR*0.88, innerR*1.22].forEach((r,i) => {
    const opacities = ['0.04','0.03','0.04'];
    const strokes = ['#00ff88','#ffcc00','#ffcc00'];
    bg.appendChild(el('circle',{ cx, cy, r, fill:'none', stroke:strokes[i], 'stroke-width':r*0.35*0.6, opacity:opacities[i] }));
  });
  // subtle radial center glow
  const cg = el('circle',{ cx, cy, r:innerR*0.38, fill:'rgba(100,100,220,0.07)', stroke:'rgba(140,140,255,0.18)', 'stroke-width':'1' });
  bg.appendChild(cg);
  const ct = el('text',{ x:cx, y:cy+5, fill:'rgba(160,160,255,0.55)', 'font-size':'12', 'text-anchor':'middle', 'font-family':'Segoe UI,sans-serif', 'font-weight':'700', class:'no-pe' });
  ct.textContent='Economy'; bg.appendChild(ct);

  // ── Layer groups ──
  ['goods','money','govt','particles','labels'].forEach(id => {
    const g = el('g',{ id:'layer-'+id });
    svg.appendChild(g);
    layers[id] = g;
  });

  renderLayers();
}

/* ── Render flow layers ── */
function renderLayers() {
  const { cx, cy, outerR, innerR, pos } = state.layout;

  // clear flow layers
  ['goods','money','govt','labels'].forEach(id => { layers[id].innerHTML = ''; });

  // ── OUTER RING (Goods & Services) ──
  if (state.goodsOn) {
    const g = layers.goods;
    // spinning dashed track
    const track = el('circle', { cx, cy, r:outerR, fill:'none', stroke:'rgba(0,255,136,0.18)', 'stroke-width':'1.5', 'stroke-dasharray':'6 8' });
    const anim = el('animateTransform', { attributeName:'transform', type:'rotate', from:`0 ${cx} ${cy}`, to:`360 ${cx} ${cy}`, dur:'22s', repeatCount:'indefinite' });
    if (state.paused) anim.setAttribute('dur','99999s');
    track.appendChild(anim); g.appendChild(track);

    // arc segments with arrows
    GOODS_FLOWS.forEach((f, i) => {
      const path = arcPath(f.from, f.to, outerR, 1); // sweep=1 clockwise
      const trimPath = trimmedArc(f.from, f.to, outerR, 1, outerR * 0.18);
      const p = el('path', {
        d: trimPath, fill:'none', stroke:'#00ff88', 'stroke-width':'2.5',
        'marker-end':'url(#arr-green)', opacity:'0.85',
        filter:'url(#glow-green)', class:'flow-arc', 'data-flow':i, 'data-type':'goods',
        'data-from':f.from, 'data-to':f.to,
        style:'cursor:pointer'
      });
      p.addEventListener('mouseenter', e => showFlowPopup(e, f));
      p.addEventListener('mousemove', e => moveFlowPopup(e));
      p.addEventListener('mouseleave', hideFlowPopup);
      g.appendChild(p);
      addPathPulse(g, trimPath, '#00ff88', 'glow-green', `${8 + i}s`);
    });

    // Labels on outer ring midpoints
    GOODS_FLOWS.forEach((f, i) => {
      const a = midAngle(f.from, f.to) * Math.PI / 180;
      const lx = cx + (outerR + 34) * Math.cos(a);
      const ly = cy + (outerR + 34) * Math.sin(a);
      addFlowLabel(layers.labels, lx, ly, routeLabel(f), '#00ff88');
    });
  }

  // ── INNER RING (Money) ──
  if (state.moneyOn) {
    const g = layers.money;
    // spinning dashed track (counter-clockwise)
    const track = el('circle', { cx, cy, r:innerR, fill:'none', stroke:'rgba(255,204,0,0.18)', 'stroke-width':'1.5', 'stroke-dasharray':'6 8' });
    const anim = el('animateTransform', { attributeName:'transform', type:'rotate', from:`0 ${cx} ${cy}`, to:`-360 ${cx} ${cy}`, dur:'16s', repeatCount:'indefinite' });
    if (state.paused) anim.setAttribute('dur','99999s');
    track.appendChild(anim); g.appendChild(track);

    // arc segments with arrows — inner ring uses counter-clockwise sweep=0
    MONEY_FLOWS.forEach((f, i) => {
      const trimPath = trimmedArc(f.from, f.to, innerR, 0, innerR * 0.22);
      const p = el('path', {
        d: trimPath, fill:'none', stroke:'#ffcc00', 'stroke-width':'2.5',
        'marker-end':'url(#arr-gold)', opacity:'0.85',
        filter:'url(#glow-gold)', class:'flow-arc', 'data-flow':i, 'data-type':'money',
        'data-from':f.from, 'data-to':f.to,
        style:'cursor:pointer'
      });
      p.addEventListener('mouseenter', e => showFlowPopup(e, f));
      p.addEventListener('mousemove', e => moveFlowPopup(e));
      p.addEventListener('mouseleave', hideFlowPopup);
      g.appendChild(p);
      addPathPulse(g, trimPath, '#ffcc00', 'glow-gold', `${7 + i}s`);
    });

    // Labels on inner ring midpoints
    MONEY_FLOWS.forEach((f, i) => {
      const a = midAngle(f.from, f.to) * Math.PI / 180;
      const lx = cx + (innerR - 36) * Math.cos(a);
      const ly = cy + (innerR - 36) * Math.sin(a);
      addFlowLabel(layers.labels, lx, ly, routeLabel(f), '#ffcc00');
    });
  }

  // ── GOVERNMENT ──
  if (state.govtOn) {
    const g = layers.govt;
    GOVT_FLOWS.forEach(f => {
      const fp = pos[f.from], tp = pos[f.to];
      const { cpx, cpy } = govtControlPoint(f.from, f.to);
      const d = `M ${fp.x} ${fp.y} Q ${cpx} ${cpy} ${tp.x} ${tp.y}`;
      const p = el('path', {
        d, fill:'none', stroke:'#ff6b6b', 'stroke-width':'2',
        'stroke-dasharray':'7 5', 'marker-end':'url(#arr-red)',
        opacity:'0.8', filter:'url(#glow-red)', class:'flow-arc',
        'data-type':'govt', 'data-from':f.from, 'data-to':f.to,
        style:'cursor:pointer'
      });
      p.addEventListener('mouseenter', e => showFlowPopup(e, f));
      p.addEventListener('mousemove', e => moveFlowPopup(e));
      p.addEventListener('mouseleave', hideFlowPopup);
      g.appendChild(p);
      addPathPulse(g, d, '#ff6b6b', 'glow-red', '9s');

      const lx = (fp.x + tp.x + cpx) / 3;
      const ly = (fp.y + tp.y + cpy) / 3;
      addFlowLabel(layers.labels, lx, ly, routeLabel(f), '#ff6b6b');
    });
  }
}

/* ── Arc path helpers ── */
function arcPath(fromId, toId, r, sweep) {
  const ANG = { households:180, factorMarket:270, businesses:0, productMarket:90 };
  const { cx, cy } = state.layout;
  const fa = ANG[fromId] * Math.PI / 180, ta = ANG[toId] * Math.PI / 180;
  const fx = cx + r*Math.cos(fa), fy = cy + r*Math.sin(fa);
  const tx = cx + r*Math.cos(ta), ty = cy + r*Math.sin(ta);
  return `M ${fx} ${fy} A ${r} ${r} 0 0 ${sweep} ${tx} ${ty}`;
}

function trimmedArc(fromId, toId, r, sweep, trim) {
  // Returns an arc path trimmed at both ends by `trim` px along the circle
  const ANG = { households:180, factorMarket:270, businesses:0, productMarket:90 };
  const { cx, cy } = state.layout;
  let fa = ANG[fromId] * Math.PI / 180;
  let ta = ANG[toId] * Math.PI / 180;
  const trimAngle = trim / r; // arc length trim in radians
  if (sweep === 1) { fa += trimAngle; ta -= trimAngle; }
  else             { fa -= trimAngle; ta += trimAngle; }
  const fx = cx + r*Math.cos(fa), fy = cy + r*Math.sin(fa);
  const tx = cx + r*Math.cos(ta), ty = cy + r*Math.sin(ta);
  // determine large-arc flag: if angular span > π
  let diff = ta - fa;
  if (sweep === 1 && diff < 0) diff += 2*Math.PI;
  if (sweep === 0 && diff > 0) diff -= 2*Math.PI;
  const large = Math.abs(diff) > Math.PI ? 1 : 0;
  return `M ${fx} ${fy} A ${r} ${r} 0 ${large} ${sweep} ${tx} ${ty}`;
}

function govtControlPoint(fromId, toId) {
  const { cx, cy, pos } = state.layout;
  const fp = pos[fromId], tp = pos[toId];
  const mx = (fp.x + tp.x) / 2, my = (fp.y + tp.y) / 2;
  // Offset control point slightly outward from center
  const dx = mx - cx, dy = my - cy;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  return { cpx: mx + dx/len * 60, cpy: my + dy/len * 60 };
}

function addFlowLabel(parent, x, y, text, color) {
  // SVG text with background rect
  const padding = 5;
  const g = el('g', { class:'no-pe' });
  const t = el('text', {
    x, y, fill: color, 'font-size':'10', 'text-anchor':'middle',
    'font-family':'Segoe UI,sans-serif', 'font-weight':'700',
    'dominant-baseline':'middle'
  });
  // Decode HTML entities for SVG
  t.textContent = text.replace(/&amp;/g,'&');
  g.appendChild(t);
  parent.appendChild(g);
}

/* ======================================================
   ENTITY CARDS
   ====================================================== */
function buildCards() {
  const container = document.getElementById('cards');
  container.innerHTML = '';
  const { pos } = state.layout;
  Object.values(ENTITIES).forEach(ent => {
    const p = pos[ent.id];
    const div = document.createElement('div');
    div.className = `ecard ${ent.type}`;
    div.id = `card-${ent.id}`;
    div.style.left = p.x + 'px';
    div.style.top  = p.y + 'px';
    div.innerHTML = `<span class="icon">${ent.icon}</span><div class="name">${ent.name}</div><div class="sub">${ent.sub}</div>`;
    div.addEventListener('click', () => openPanel(ent.id));
    div.addEventListener('mouseenter', () => highlightEntity(ent.id));
    div.addEventListener('mouseleave', () => clearHighlight());
    container.appendChild(div);
  });
}

/* ======================================================
   PARTICLES
   ====================================================== */
function buildParticles() {
  layers.particles.innerHTML = '';
  state.particles = [];
  const { cx, cy, outerR, innerR } = state.layout;

  // Outer particles (goods, clockwise, green)
  for (let i = 0; i < 6; i++) {
    addParticle(outerR, 1,  '#00ff88', i / 6, 8 + i*0.4, 'goods');
  }
  // Inner particles (money, counter-clockwise, gold)
  for (let i = 0; i < 6; i++) {
    addParticle(innerR, -1, '#ffcc00', i / 6, 6 + i*0.3, 'money');
  }
}

function addParticle(r, dir, color, phase, speed, type) {
  const { cx, cy } = state.layout;
  const circle = el('circle', { r:'5', fill:color, opacity:'0.92', filter:`url(#glow-${color==='#00ff88'?'green':'gold'})` });
  const trail  = el('circle', { r:'3', fill:color, opacity:'0.35' });
  layers.particles.appendChild(trail);
  layers.particles.appendChild(circle);
  state.particles.push({ circle, trail, r, dir, phase, speed, type, cx, cy });
}

let lastTime = 0;
function animateParticles(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (!state.paused) {
    state.particles.forEach(p => {
      if (p.type === 'goods' && !state.goodsOn) { p.circle.setAttribute('opacity','0'); p.trail.setAttribute('opacity','0'); return; }
      if (p.type === 'money' && !state.moneyOn) { p.circle.setAttribute('opacity','0'); p.trail.setAttribute('opacity','0'); return; }
      p.circle.setAttribute('opacity','0.92');
      p.trail.setAttribute('opacity','0.35');

      p.phase += dt * p.dir / p.speed;
      const ang = p.phase * 2 * Math.PI;
      const trailAng = ang - p.dir * 0.15;
      const x = p.cx + p.r * Math.cos(ang);
      const y = p.cy + p.r * Math.sin(ang);
      const tx = p.cx + p.r * Math.cos(trailAng);
      const ty = p.cy + p.r * Math.sin(trailAng);
      p.circle.setAttribute('cx', x); p.circle.setAttribute('cy', y);
      p.trail.setAttribute('cx', tx); p.trail.setAttribute('cy', ty);
    });
  }
  state.raf = requestAnimationFrame(animateParticles);
}

/* ======================================================
   INTERACTIONS
   ====================================================== */
function openPanel(id) {
  const ent = ENTITIES[id];
  if (!ent) return;
  document.getElementById('panel-icon').textContent = ent.icon;
  document.getElementById('panel-title').textContent = ent.title;
  document.getElementById('panel-type').textContent = ent.typeLabel;
  document.getElementById('panel-desc').innerHTML = ent.desc;
  const ul = document.getElementById('panel-list');
  ul.innerHTML = '';
  ent.details.forEach(d => { const li = document.createElement('li'); li.innerHTML = d; ul.appendChild(li); });
  // color accent
  document.getElementById('info-panel').style.borderColor = ent.color + '55';
  document.getElementById('panel-title').style.color = ent.color;
  document.getElementById('info-panel').classList.add('open');
  state.activeId = id;
  highlightEntity(id);
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('open');
  state.activeId = null;
  clearHighlight();
}

function highlightEntity(id) {
  document.querySelectorAll('.ecard').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + id);
  if (card) card.classList.add('active');

  document.querySelectorAll('.flow-arc').forEach(arc => {
    const from = arc.getAttribute('data-from');
    const to = arc.getAttribute('data-to');
    arc.setAttribute('opacity', (from === id || to === id) ? '0.92' : '0.2');
  });
}

function clearHighlight() {
  if (state.activeId) return; // keep highlight if panel open
  document.querySelectorAll('.ecard').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.flow-arc').forEach(arc => {
    arc.setAttribute('opacity', arc.getAttribute('data-type') === 'govt' ? '0.8' : '0.85');
  });
}

function showFlowPopup(e, flow) {
  const popup = document.getElementById('flow-popup');
  document.getElementById('fp-label').innerHTML = flow.label;
  document.getElementById('fp-sub').innerHTML = flow.sub || '';
  popup.style.borderColor = (flow.color || '#fff') + '66';
  document.getElementById('fp-label').style.color = flow.color || '#fff';
  popup.style.display = 'block';
  moveFlowPopup(e);
}
function moveFlowPopup(e) {
  const popup = document.getElementById('flow-popup');
  const PAD = 10;
  const w = popup.offsetWidth || 230;
  const h = popup.offsetHeight || 72;
  let left = e.clientX + 16;
  let top = e.clientY - 10;
  if (left + w > window.innerWidth - PAD) left = window.innerWidth - w - PAD;
  if (top + h > window.innerHeight - PAD) top = window.innerHeight - h - PAD;
  if (top < 70) top = 70;
  if (left < PAD) left = PAD;
  popup.style.left = left + 'px';
  popup.style.top  = top + 'px';
}
function hideFlowPopup() {
  document.getElementById('flow-popup').style.display = 'none';
}

/* ======================================================
   TOGGLE CONTROLS
   ====================================================== */
function toggleLayer(type) {
  if (type === 'goods') {
    state.goodsOn = !state.goodsOn;
    document.getElementById('btn-goods').classList.toggle('on', state.goodsOn);
  } else if (type === 'money') {
    state.moneyOn = !state.moneyOn;
    document.getElementById('btn-money').classList.toggle('on', state.moneyOn);
  } else if (type === 'govt') {
    state.govtOn = !state.govtOn;
    document.getElementById('btn-govt').classList.toggle('on', state.govtOn);
  }
  renderLayers();
}

function togglePause() {
  state.paused = !state.paused;
  const btn = document.getElementById('btn-pause');
  btn.classList.toggle('on', state.paused);
  btn.textContent = state.paused ? '▶ Resume' : '⏸ Pause';
  // Rebuild SVG to update animation durations
  buildSVG();
  buildCards();
}

function resetView() {
  state.goodsOn = true; state.moneyOn = true; state.govtOn = true;
  state.paused = false; state.activeId = null;
  document.getElementById('btn-goods').classList.add('on');
  document.getElementById('btn-money').classList.add('on');
  document.getElementById('btn-govt').classList.add('on');
  document.getElementById('btn-pause').classList.remove('on');
  document.getElementById('btn-pause').textContent = '⏸ Pause';
  closePanel();
  buildSVG();
  buildCards();
  buildParticles();
}

/* ======================================================
   INIT & RESIZE
   ====================================================== */
function init() {
  state.layout = computeLayout();
  buildSVG();
  buildCards();
  buildParticles();
  if (state.raf) cancelAnimationFrame(state.raf);
  state.raf = requestAnimationFrame(animateParticles);
}

window.addEventListener('resize', () => {
  state.layout = computeLayout();
  // Rebuild to reposition everything
  buildSVG();
  buildCards();
  buildParticles();
  // Reopen panel if active
  if (state.activeId) { openPanel(state.activeId); }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
});

init();
</script>
